# /etc/nginx/nginx.conf
# Reference config for k7swi.org server.
# Copy to /etc/nginx/nginx.conf — replaces the Ubuntu/Debian default.
# Site configs live in /etc/nginx/sites-available/ with symlinks in sites-enabled/.

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Core ───────────────────────────────────────────────────────────────────
    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens  off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── TLS defaults (applied to all SSL server blocks) ────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers (applied globally; override per-site if needed) ───────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # ── Logging ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Gzip ────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml;

    # ── Virtual hosts ──────────────────────────────────────────────────────────
    # Each site gets its own file in /etc/nginx/sites-available/ with a symlink
    # in /etc/nginx/sites-enabled/.  The default catch-all below rejects unknown
    # hostnames so stray requests don't hit a real site.
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
