name: Build Windows TNC Relay App

# Runs on Windows so the native serialport bindings are correct.
# Triggered automatically when relay-app sources change, or manually
# from the Actions tab (useful for first-time setup).

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'tools/relay-app/**'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create/update the GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: tools/relay-app
        run: npm install

      - name: Build exe with pkg
        working-directory: tools/relay-app
        run: npm run build

      - name: Publish to GitHub Release (tag tnc-relay-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tnc-relay-latest
          name: TNC Relay App (Windows)
          prerelease: false
          make_latest: false
          body: |
            Self-contained Windows application for bridging a serial KISS TNC
            to the RaceTracker server.

            **No installation or Node.js required** — double-click to run,
            fill in the server URL and credentials, click Connect.

            Config is saved to `%APPDATA%\RaceTrackerTNC\config.json` for
            next time.
          files: public/downloads/RaceTrackerTNC.exe
