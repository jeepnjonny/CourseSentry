# CourseSentry nginx config — subdomain coursesentry.k7swi.org with SSL
#
# Install:
#   sudo cp nginx-coursesentry.conf /etc/nginx/sites-available/coursesentry
#   sudo ln -sf /etc/nginx/sites-available/coursesentry /etc/nginx/sites-enabled/coursesentry
#
# First-time SSL (certs must exist before nginx loads the HTTPS block):
#   1. Temporarily comment out the HTTPS server block below and reload nginx.
#   2. Run:  sudo certbot certonly --nginx -d coursesentry.k7swi.org
#   3. Uncomment the HTTPS block and reload again:  sudo systemctl reload nginx
#
# Or just run setup.sh --ssl which handles all of this automatically.

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name coursesentry.k7swi.org;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name coursesentry.k7swi.org;

    ssl_certificate     /etc/letsencrypt/live/coursesentry.k7swi.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coursesentry.k7swi.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;

        # Allow large KML/GPX/CSV uploads
        client_max_body_size 50m;

        # WebSocket upgrade
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep long-lived connections (WebSocket, SSE)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }
}
