<!--
  CourseSentry Live Viewer
  
  This is a public-facing, read-only interface for viewing live race data without authentication.
  It displays an interactive map with participant positions and an optional leaderboard sidebar.
  Access is controlled via viewer tokens generated by administrators for specific races.
  
  Layout:
  - Top Bar: Race name, live clock, theme/view toggle
  - Center: Interactive Leaflet map showing participant positions
  - Right Sidebar: Leaderboard (desktop) or bottom tab bar (mobile)
  
  Key Features:
  - No authentication required (token-based access)
  - Real-time WebSocket updates for participant positions
  - Responsive map with custom participant markers (color-coded by heat)
  - Leaderboard with sorting (time/distance/pace)
  - Mobile-optimized tab navigation (mobile view only)
  - Theme selection dropdown
  - Light/dark theme support with user-selectable themes
  
  Responsive Behavior:
  - Desktop (>700px): Leaderboard sidebar always visible on right
  - Mobile (≤700px): Tab bar at bottom, leaderboard toggleable
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourseSentry — Live View</title>
  <base href="/CourseSentry/">
  <link rel="icon" href="img/logo-icon.svg" type="image/svg+xml">
  <!-- Leaflet CSS for interactive mapping -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <!-- Base application theme -->
  <link rel="stylesheet" href="css/theme.css">
  <!-- Dynamic theme CSS loaded from user selection -->
  <link id="rt-theme-css" rel="stylesheet">
<style>
  html, body { max-width: 100vw; overflow-x: hidden; }
  /* 100dvh = dynamic viewport height: excludes mobile browser chrome (address bar, nav),
     fixing the tab bar being pushed off-screen on iOS Safari / Android Chrome.
     Falls back to theme.css's 100vh on browsers that don't support dvh. */
  body { overflow: hidden; height: 100dvh; }

  /* ── Topbar ── */
  #viewer-topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 6px 10px; display: flex; flex-direction: column;
    gap: 4px; flex-shrink: 0;
  }
  #vt-row-name {
    display: flex; align-items: center; gap: 8px; min-width: 0;
  }
  #viewer-topbar h1 {
    font-size: 17px; font-weight: bold; letter-spacing: 2px;
    color: var(--accent); white-space: nowrap; flex-shrink: 0;
  }
  #vw-race-pill { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 1; }
  #vt-row-clock { display: flex; justify-content: center; }
  #vw-clock { font-size: 26px; font-weight: bold; color: var(--accent2); letter-spacing: 3px; white-space: nowrap; }
  #vt-row-controls { display: flex; align-items: center; gap: 8px; }
  #vt-row-controls select { flex: 1; font-size: 14px; padding: 4px 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: var(--font); }
  #vt-row-controls #view-toggle { margin-left: auto; }

  @media (min-width: 701px) {
    #viewer-topbar { flex-direction: row; align-items: center; padding: 6px 10px; gap: 8px; }
    #vt-row-name { flex: 1; }
    #vt-row-clock { justify-content: unset; margin-left: auto; }
    #vw-clock { font-size: 22px; letter-spacing: 2px; }
    #vt-row-controls { gap: 8px; }
    #vt-row-controls #view-toggle { margin-left: 0; }
    #vt-row-controls select { flex: unset; max-width: 90px; }
  }

  /* ── Main layout ── */
  #viewer-main { display: flex; flex: 1; overflow: hidden; min-width: 0; min-height: 0; }
  #viewer-map-wrap { flex: 1; position: relative; min-width: 0; min-height: 0; }
  #viewer-map { width: 100%; height: 100%; }

  /* ── Leaderboard sidebar ── */
  #viewer-lb-wrap {
    width: clamp(260px, 30vw, 360px);
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  #viewer-sort-bar { display: flex; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .v-sort-btn { font-size: 13px; padding: 2px 8px; }
  .v-sort-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Leaderboard grid — named areas so responsive override is clean */
  .v-lb-cols { grid-template-columns: 22px 50px 1fr 44px 68px 72px; }
  .v-lb-head {
    font-size: 13px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase;
    display: grid; gap: 4px; padding: 4px 8px;
    border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0;
  }
  #viewer-lb-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .v-lb-row {
    display: grid; gap: 4px; padding: 5px 8px;
    border-bottom: 1px solid var(--border); font-size: 16px;
  }
  .v-lb-row.alert-row { animation: blink 1.2s infinite; }

  /* ── Bottom tab bar (mobile only) ── */
  #viewer-tabbar { display: none; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .rt-tab {
    flex: 1; padding: 10px 4px; text-align: center;
    background: none; border: none; border-top: 2px solid transparent; cursor: pointer;
    color: var(--text3); transition: color 0.15s, border-color 0.15s;
  }
  .rt-tab-icon { font-size: 22px; line-height: 1; display: block; }
  .rt-tab.active { color: var(--accent); border-top-color: var(--accent); }

  @media (min-width: 701px) {
    #viewer-lb-wrap { display: flex !important; }
    #viewer-topbar h1 { display: block; }
  }

  @media (max-width: 700px) {
    #viewer-topbar h1 { display: none; }
    #viewer-tabbar { display: flex; }
    #viewer-lb-wrap { display: none; width: 100%; border-left: none; flex-shrink: unset; }
    body.lb-mode #viewer-map-wrap { display: none; }
    body.lb-mode #viewer-lb-wrap { display: flex; width: 100%; }
    .v-lb-cols { grid-template-columns: 18px 44px 1fr 38px 58px 60px; }
    .v-lb-row, .v-lb-head { padding: 4px 6px; font-size: 14px; gap: 3px; }
  }

  /* Privacy: hide name column when viewer_show_names is off */
  #viewer-lb-wrap.names-hidden .v-lb-cols { grid-template-columns: 22px 50px 44px 68px 72px; }
  #viewer-lb-wrap.names-hidden .v-lb-cols > span:nth-child(3) { display: none; }
  #viewer-lb-wrap.names-hidden [data-sort="name"] { display: none; }
  @media (max-width: 700px) {
    #viewer-lb-wrap.names-hidden .v-lb-cols { grid-template-columns: 18px 44px 38px 58px 60px; }
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .tracker-icon-alert { animation: blink 1s infinite; }
  .leaflet-div-icon { background: none; border: none; }
  /* Leaflet controls themed to match app */
  .leaflet-control-layers {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 6px !important; box-shadow: none !important;
    color: var(--text) !important; font-family: var(--font) !important; font-size: 14px !important;
  }
  .leaflet-control-layers-toggle { background-color: var(--surface2) !important; }
  .leaflet-control-layers-expanded { padding: 8px 10px !important; }
  .leaflet-control-layers-separator { border-top: 1px solid var(--border) !important; }
  .leaflet-control-layers label { display: flex !important; align-items: center !important; gap: 6px !important; color: var(--text2) !important; font-size: 14px !important; margin: 2px 0 !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important; border-color: var(--border) !important;
    color: var(--text) !important; font-family: var(--font) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
  .map-nametag {
    background: rgba(13,17,23,0.82) !important;
    border: 1px solid rgba(255,255,255,.12) !important;
    border-radius: 3px !important;
    color: #c9d1d9 !important;
    font-size: 11px !important;
    font-family: var(--font) !important;
    padding: 1px 5px !important;
    white-space: nowrap !important;
    box-shadow: 0 1px 4px rgba(0,0,0,.5) !important;
    pointer-events: none !important;
  }
  .map-nametag::before { border: none !important; }
</style>
</head>
<body>
<div id="viewer-topbar">
  <div id="vt-row-name">
    <h1><img class="logo-reversed" src="img/logo-reversed.svg" alt="CourseSentry" height="28"><img class="logo-color" src="img/logo-color.svg" alt="CourseSentry" height="28"></h1>
    <div class="pill pill-idle" id="vw-race-pill">LOADING...</div>
  </div>
  <div id="vt-row-clock">
    <div id="vw-clock">--:--:--</div>
  </div>
  <div id="vt-row-controls">
    <select id="vw-base-layer-sel" onchange="VW.setViewerBaseLayer(this.value)">
      <option value="Topo">Topo</option>
      <option value="Satellite">Satellite</option>
      <option value="Street">Street</option>
      <option value="Dark">Dark</option>
    </select>
  </div>
</div>
<div id="viewer-main">
  <div id="viewer-map-wrap">
    <div id="viewer-map"></div>
  </div>
  <div id="viewer-lb-wrap">
    <div id="viewer-sort-bar">
      <span style="font-size:13px;color:var(--text3);align-self:center">SORT:</span>
      <button class="v-sort-btn active" data-sort="position" onclick="VW.setSort('position')">POSITION</button>
      <button class="v-sort-btn" data-sort="bib" onclick="VW.setSort('bib')">BIB</button>
      <button class="v-sort-btn" data-sort="pace" onclick="VW.setSort('pace')">PACE</button>
      <button class="v-sort-btn" data-sort="name" onclick="VW.setSort('name')">NAME</button>
      <button class="v-sort-btn" data-sort="heat" onclick="VW.setSort('heat')">HEAT</button>
    </div>
    <div class="v-lb-head v-lb-cols">
      <span>#</span><span>BIB</span><span>NAME</span><span>PROG</span><span>PACE</span><span>LAST AID</span>
    </div>
    <div id="viewer-lb-body"></div>
  </div>
</div>
<div id="viewer-tabbar">
  <button class="rt-tab active" data-tab="map" onclick="VW.switchTab('map')">
    <span class="rt-tab-icon">&#x1F5FA;</span>
  </button>
  <button class="rt-tab" data-tab="lb" onclick="VW.switchTab('lb')">
    <span class="rt-tab-icon">&#x1F3C5;</span>
  </button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="js/common.js"></script>
<script src="js/viewer.js"></script>
</body>
</html>
