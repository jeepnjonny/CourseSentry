<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RaceTracker — MobilOp</title>
<base href="/RaceTracker/">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="css/theme.css">
<link id="rt-theme-css" rel="stylesheet">
<style>
  html, body { height: 100%; overflow: hidden; }

  #mo-topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  #mo-title { font-size: 16px; font-weight: bold; color: var(--accent); letter-spacing: 1.5px; flex-shrink: 0; }
  #mo-race-name { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  #mo-station-badge {
    font-size: 12px; padding: 2px 8px; flex-shrink: 0;
    background: rgba(88,166,255,.1); color: var(--accent);
    border: 1px solid rgba(88,166,255,.3); border-radius: 12px; white-space: nowrap;
    cursor: pointer;
  }
  #mo-station-badge:hover { background: rgba(88,166,255,.2); }

  #mo-body { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

  .mo-panel { flex: 1; overflow: hidden; display: none; flex-direction: column; }
  .mo-panel.active { display: flex; }

  #mo-tabbar {
    display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .mo-tab {
    flex: 1; padding: 10px 4px; text-align: center;
    font-size: 11px; letter-spacing: 1px; color: var(--text3);
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: color 0.15s;
  }
  .mo-tab-icon { font-size: 18px; line-height: 1; }
  .mo-tab.active { color: var(--accent); }

  /* Map */
  #mo-map { width: 100%; flex: 1; }
  .leaflet-div-icon { background: none; border: none; }
  .tracker-icon-alert { animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .leaflet-control-zoom a {
    background: var(--surface) !important; border-color: var(--border) !important;
    color: var(--text) !important; font-family: var(--font) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

  /* Leaderboard */
  .mo-lb-head {
    font-size: 12px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase;
    display: grid; grid-template-columns: 48px 1fr 64px 72px;
    gap: 4px; padding: 6px 10px;
    border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0;
  }
  #mo-lb-body { flex: 1; overflow-y: auto; }
  .mo-lb-row {
    display: grid; grid-template-columns: 48px 1fr 64px 72px;
    align-items: center; gap: 4px; padding: 10px 10px;
    border-bottom: 1px solid var(--border); font-size: 14px; cursor: pointer;
  }
  .mo-lb-row:hover { background: var(--surface2); }
  .mo-lb-row:active { background: var(--surface3, #161b22); }

  /* LOG */
  #mo-log-inner { display: flex; flex-direction: column; height: 100%; }
  #mo-no-station {
    padding: 10px 12px; background: rgba(215,130,0,.08);
    border-bottom: 1px solid rgba(215,130,0,.25);
    color: var(--accent3); font-size: 13px; text-align: center;
    flex-shrink: 0;
  }
  #mo-search-bar {
    padding: 10px 12px; display: flex; gap: 8px;
    border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0;
  }
  #mo-bib-input {
    flex: 1; font-size: 22px; padding: 10px 12px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; font-family: var(--font); text-transform: uppercase;
  }
  #mo-search-btn { font-size: 16px; padding: 10px 20px; letter-spacing: 1px; }
  #mo-participant-card {
    padding: 12px 12px 10px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; display: none; flex-direction: column; gap: 10px;
  }
  #mo-participant-card.visible { display: flex; }
  .mo-p-name { font-size: 20px; font-weight: bold; color: var(--text); }
  .mo-p-meta { font-size: 13px; color: var(--text2); display: flex; gap: 12px; flex-wrap: wrap; }
  .mo-action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .mo-action-btn {
    padding: 16px 8px; font-size: 14px; letter-spacing: 1.5px;
    border-radius: 6px; font-weight: bold; border: none; cursor: pointer;
    font-family: var(--font); transition: opacity 0.15s;
  }
  .mo-action-btn:active { opacity: 0.7; }
  .mo-btn-arrive { background: var(--accent2); color: #000; }
  .mo-btn-depart { background: var(--accent);  color: #000; }
  .mo-btn-dnf    { background: var(--accent3); color: #fff; }
  #mo-events-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .mo-events-head {
    padding: 5px 12px; font-size: 11px; letter-spacing: 2px;
    color: var(--text3); background: var(--surface2);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #mo-events-list { flex: 1; overflow-y: auto; }
  .mo-event-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .mo-event-time { color: var(--text3); white-space: nowrap; flex-shrink: 0; }
  .mo-event-type { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; width: 74px; font-size: 12px; }
  .mo-event-who  { color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Messages */
  #mo-msg-body { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  #mo-msg-compose {
    padding: 8px 10px; display: flex; gap: 6px;
    border-top: 1px solid var(--border); background: var(--surface2); flex-shrink: 0;
  }
  #mo-msg-input {
    flex: 1; padding: 10px 12px; font-size: 15px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; font-family: var(--font);
  }
  .mo-msg-out { background: rgba(88,166,255,.12); border: 1px solid rgba(88,166,255,.3); border-radius: 8px 8px 0 8px; padding: 6px 10px; align-self: flex-end; max-width: 88%; }
  .mo-msg-in  { background: rgba(63,185,80,.10);  border: 1px solid rgba(63,185,80,.3);  border-radius: 8px 8px 8px 0; padding: 6px 10px; align-self: flex-start; max-width: 88%; }
  .mo-msg-from { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .mo-msg-text { font-size: 14px; color: var(--text); }
  .mo-msg-ts   { font-size: 11px; color: var(--text3); margin-top: 2px; text-align: right; }

  /* Station picker modal */
  .sp-item {
    padding: 14px 16px; border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 8px; cursor: pointer; background: var(--surface2);
    transition: border-color 0.15s;
  }
  .sp-item:hover, .sp-item:active { border-color: var(--accent); background: var(--surface3, #161b22); }
  .sp-item-name { font-size: 17px; font-weight: bold; color: var(--text); }
  .sp-item-type { font-size: 12px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
  #station-picker .modal { max-height: 80vh; overflow-y: auto; max-width: 420px; }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh">

  <div id="mo-topbar">
    <div id="mo-title">&#9654; MOBILOP</div>
    <div id="mo-race-name">Loading…</div>
    <div id="mo-station-badge" class="hidden" title="Tap to change station" onclick="showStationPicker()">—</div>
    <button onclick="RT.logout()" style="font-size:12px;padding:5px 10px;flex-shrink:0">OUT</button>
  </div>

  <div id="mo-body">

    <!-- MAP -->
    <div class="mo-panel active" id="panel-map">
      <div id="mo-map"></div>
    </div>

    <!-- LEADERBOARD -->
    <div class="mo-panel" id="panel-lb">
      <div class="mo-lb-head">
        <span>BIB</span><span>NAME</span><span>STATUS</span><span>ELAPSED</span>
      </div>
      <div id="mo-lb-body"></div>
    </div>

    <!-- LOG -->
    <div class="mo-panel" id="panel-log">
      <div id="mo-log-inner">
        <div id="mo-no-station" class="hidden">No station assigned — tap the station badge above to select one.</div>
        <div id="mo-search-bar">
          <input id="mo-bib-input" type="text" inputmode="numeric" placeholder="BIB #" autocomplete="off">
          <button id="mo-search-btn" class="primary" onclick="searchBib()">GO</button>
        </div>
        <div id="mo-participant-card">
          <div>
            <div class="mo-p-name" id="mo-p-name">—</div>
            <div class="mo-p-meta" id="mo-p-meta"></div>
          </div>
          <div class="mo-action-btns">
            <button class="mo-action-btn mo-btn-arrive" onclick="logEvent('aid_arrive')">ARRIVE</button>
            <button class="mo-action-btn mo-btn-depart" onclick="logEvent('aid_depart')">DEPART</button>
            <button class="mo-action-btn mo-btn-dnf"    onclick="logEvent('dnf')">DNF</button>
          </div>
        </div>
        <div id="mo-events-section">
          <div class="mo-events-head">RECENT STATION EVENTS</div>
          <div id="mo-events-list"></div>
        </div>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="mo-panel" id="panel-msg">
      <div id="mo-msg-body"></div>
      <div id="mo-msg-compose">
        <input id="mo-msg-input" type="text" placeholder="Message…">
        <button class="primary" onclick="sendMessage()" style="padding:10px 16px;font-size:15px">SEND</button>
      </div>
    </div>

  </div>

  <div id="mo-tabbar">
    <button class="mo-tab active" data-panel="map" onclick="switchTab('map')">
      <span class="mo-tab-icon">&#x1F5FA;</span>MAP
    </button>
    <button class="mo-tab" data-panel="lb" onclick="switchTab('lb')">
      <span class="mo-tab-icon">&#x1F3C5;</span>BOARD
    </button>
    <button class="mo-tab" data-panel="log" onclick="switchTab('log')">
      <span class="mo-tab-icon">&#x1F4CB;</span>LOG
    </button>
    <button class="mo-tab hidden" id="tab-msg" data-panel="msg" onclick="switchTab('msg')">
      <span class="mo-tab-icon">&#x1F4AC;</span>MSG
    </button>
  </div>

</div>

<!-- Station picker -->
<div class="modal-bg hidden" id="station-picker">
  <div class="modal" style="max-width:420px;width:calc(100% - 32px)">
    <h2>SELECT YOUR STATION</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Choose the aid station you are operating.</p>
    <div id="sp-list"></div>
    <div class="modal-footer" id="sp-footer" style="display:none">
      <button onclick="document.getElementById('station-picker').classList.add('hidden')">CANCEL</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="js/common.js"></script>
<script src="js/mobileop.js"></script>
</body>
</html>
