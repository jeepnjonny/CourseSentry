<!--
  RaceTracker Mobile Operator (Station Personnel View)

  Optimized mobile-first interface for station personnel to monitor their assigned station and
  provide real-time participant check-in, tracking, and alerts. Designed for smaller screens
  (phones/tablets) with touch-friendly controls and minimal text. Supports both mobile portrait
  and desktop landscape viewing.

  Layout (Mobile Portrait):
  - Top bar (stacked rows): Race name + station badge, live clock, controls
  - Body: Map/Leaderboard share the main area; LOG and MSG are full-screen overlay panels
  - Bottom tab bar: Map, Leaderboard, Log, (Msg) tabs with icons

  Layout (Desktop Landscape):
  - Top bar (horizontal single row): Title, race name, station badge, clock, controls, logout
  - Body: Map (flex) + Leaderboard sidebar — identical structure to viewer

  Key Features:
  - WebSocket real-time participant position updates and status changes
  - Manual participant check-in via BIB number search (ARRIVE / DEPART / DNF)
  - Leaflet map with custom participant icons colored by heat
  - Interactive leaderboard: tap to select participants, view details
  - Log viewer: Real-time station event stream
  - Map layer selection: Topo, satellite, street, dark basemaps
  - Responsive design: Automatically switches layout on viewport change

  Key Algorithms:
  - Leaderboard sorting: Status-priority then BIB number
  - Map updates: WebSocket push triggers marker re-render

  Responsive Breakpoints:
  - Mobile (≤700px): Stacked topbar, bottom tabs, full-screen panels
  - Desktop (>700px): Single-row topbar, map + leaderboard sidebar (no tab bar)
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RaceTracker — MobilOp</title>
<base href="/RaceTracker/">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="css/theme.css">
<link id="rt-theme-css" rel="stylesheet">
<style>
  html, body { max-width: 100vw; overflow-x: hidden; }
  /* 100dvh = dynamic viewport height: excludes mobile browser chrome,
     fixing the tab bar being pushed off-screen on iOS Safari / Android Chrome.
     Falls back to theme.css's 100vh on browsers that don't support dvh. */
  body { overflow: hidden; height: 100dvh; }

  /* ── Topbar ── */
  #mo-topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 6px 10px; display: flex; flex-direction: column;
    gap: 4px; flex-shrink: 0;
  }
  #mot-row-name {
    display: flex; align-items: center; gap: 8px; min-width: 0;
  }
  #mo-topbar h1 {
    font-size: 17px; font-weight: bold; letter-spacing: 2px;
    color: var(--accent); white-space: nowrap; flex-shrink: 0;
  }
  #mo-race-pill { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 1; }
  #mo-station-badge {
    font-size: 13px; padding: 3px 10px; flex-shrink: 0; margin-left: auto;
    background: rgba(88,166,255,.1); color: var(--accent);
    border: 1px solid rgba(88,166,255,.3); border-radius: 20px; white-space: nowrap;
    cursor: pointer; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  }
  #mo-station-badge:hover, #mo-station-badge:active { background: rgba(88,166,255,.2); }
  #mot-row-clock { display: flex; justify-content: center; }
  #mo-clock { font-size: 26px; font-weight: bold; color: var(--accent2); letter-spacing: 3px; white-space: nowrap; }
  #mot-row-controls { display: flex; align-items: center; gap: 8px; }
  #mot-row-controls select { flex: 1; font-size: 14px; padding: 4px 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: var(--font); }

  @media (min-width: 701px) {
    #mo-topbar { flex-direction: row; align-items: center; padding: 6px 10px; gap: 8px; }
    #mot-row-name { flex: 1; }
    #mot-row-clock { justify-content: unset; margin-left: auto; }
    #mo-clock { font-size: 22px; letter-spacing: 2px; }
    #mot-row-controls { gap: 8px; }
    #mot-row-controls select { flex: unset; max-width: 90px; }
  }

  /* ── Main layout (map + leaderboard) ── */
  #mo-main { display: flex; flex: 1; overflow: hidden; min-width: 0; min-height: 0; }
  #mo-map-wrap { flex: 1; position: relative; min-width: 0; min-height: 0; }
  #mo-map { width: 100%; height: 100%; }

  /* ── Leaderboard sidebar ── */
  #mo-lb-wrap {
    width: clamp(260px, 30vw, 360px);
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  #mo-sort-bar { display: flex; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .v-sort-btn { font-size: 13px; padding: 2px 8px; }
  .v-sort-btn.active { border-color: var(--accent); color: var(--accent); }
  .v-lb-cols { grid-template-columns: 22px 50px 1fr 44px 68px 72px; }
  .v-lb-head {
    font-size: 13px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase;
    display: grid; gap: 4px; padding: 4px 8px;
    border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0;
  }
  #mo-lb-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .v-lb-row {
    display: grid; gap: 4px; padding: 5px 8px;
    border-bottom: 1px solid var(--border); font-size: 16px;
  }

  /* ── Extra panels (LOG, MSG) — full-screen, mobile only ── */
  .mo-extra-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .mo-extra-panel.active { display: flex; }
  body.mo-extra-active #mo-main { display: none; }

  /* ── Sidebar messaging panel ── */
  #mo-msg-sidebar { display: none; flex-direction: column; border-top: 2px solid var(--border); flex-shrink: 0; height: 210px; }
  .msg-wrap { display: flex; flex-direction: column; gap: 2px; padding: 6px; overflow-y: auto; flex: 1; }
  .msg-bubble-out { background: rgba(88,166,255,.12); border: 1px solid rgba(88,166,255,.3); border-radius: 6px 6px 0 6px; padding: 5px 8px; margin: 4px 0; align-self: flex-end; max-width: 85%; font-size: 13px; }
  .msg-bubble-in  { background: rgba(63,185,80,.10);  border: 1px solid rgba(63,185,80,.3);  border-radius: 6px 6px 6px 0; padding: 5px 8px; margin: 4px 0; align-self: flex-start; max-width: 85%; font-size: 13px; }

  /* ── Bottom tab bar (mobile only) ── */
  #mo-tabbar { display: none; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .rt-tab {
    flex: 1; padding: 10px 4px; text-align: center;
    background: none; border: none; border-top: 2px solid transparent; cursor: pointer;
    color: var(--text3); transition: color 0.15s, border-color 0.15s;
  }
  .rt-tab-icon { font-size: 22px; line-height: 1; display: block; }
  .rt-tab.active { color: var(--accent); border-top-color: var(--accent); }

  @media (min-width: 701px) {
    #mo-lb-wrap { display: flex !important; }
    #mo-topbar h1 { display: block; }
  }

  @media (max-width: 700px) {
    #mo-topbar h1 { display: none; }
    #mo-tabbar { display: flex; }
    #mo-lb-wrap { display: none; width: 100%; border-left: none; flex-shrink: unset; }
    body.mo-lb-mode #mo-map-wrap { display: none; }
    body.mo-lb-mode #mo-lb-wrap { display: flex; width: 100%; }
    .v-lb-cols { grid-template-columns: 18px 44px 1fr 38px 58px 60px; }
    .v-lb-row, .v-lb-head { padding: 4px 6px; font-size: 14px; gap: 3px; }
  }

  /* ── Map ── */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .tracker-icon-alert { animation: blink 1s infinite; }
  .leaflet-div-icon { background: none; border: none; }
  /* Leaflet controls themed to match app */
  .leaflet-control-layers {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 6px !important; box-shadow: none !important;
    color: var(--text) !important; font-family: var(--font) !important; font-size: 14px !important;
  }
  .leaflet-control-layers-toggle { background-color: var(--surface2) !important; }
  .leaflet-control-layers-expanded { padding: 8px 10px !important; }
  .leaflet-control-layers-separator { border-top: 1px solid var(--border) !important; }
  .leaflet-control-layers label { display: flex !important; align-items: center !important; gap: 6px !important; color: var(--text2) !important; font-size: 14px !important; margin: 2px 0 !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important; border-color: var(--border) !important;
    color: var(--text) !important; font-family: var(--font) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

  /* ── LOG panel ── */
  #mo-log-inner { display: flex; flex-direction: column; height: 100%; }
  #mo-no-station {
    padding: 10px 12px; background: rgba(215,130,0,.08);
    border-bottom: 1px solid rgba(215,130,0,.25);
    color: var(--accent3); font-size: 13px; text-align: center;
    flex-shrink: 0;
  }
  #mo-search-bar {
    padding: 10px 12px; display: flex; gap: 8px;
    border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0;
  }
  #mo-bib-input {
    flex: 1; font-size: 22px; padding: 10px 12px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; font-family: var(--font); text-transform: uppercase;
  }
  #mo-search-btn { font-size: 16px; padding: 10px 20px; letter-spacing: 1px; }
  #mo-participant-card {
    padding: 12px 12px 10px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; display: none; flex-direction: column; gap: 10px;
  }
  #mo-participant-card.visible { display: flex; }
  .mo-p-name { font-size: 20px; font-weight: bold; color: var(--text); }
  .mo-p-meta { font-size: 13px; color: var(--text2); display: flex; gap: 12px; flex-wrap: wrap; }
  .mo-action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .mo-action-btn {
    padding: 16px 8px; font-size: 14px; letter-spacing: 1.5px;
    border-radius: 6px; font-weight: bold; border: none; cursor: pointer;
    font-family: var(--font); transition: opacity 0.15s;
  }
  .mo-action-btn:active { opacity: 0.7; }
  .mo-btn-arrive { background: var(--accent2); color: #000; }
  .mo-btn-depart { background: var(--accent);  color: #000; }
  .mo-btn-dnf    { background: var(--accent3); color: #fff; }
  #mo-events-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .mo-events-head {
    padding: 5px 12px; font-size: 11px; letter-spacing: 2px;
    color: var(--text3); background: var(--surface2);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #mo-events-list { flex: 1; overflow-y: auto; }
  .mo-event-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .mo-event-time { color: var(--text3); white-space: nowrap; flex-shrink: 0; }
  .mo-event-type { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; width: 74px; font-size: 12px; }
  .mo-event-who  { color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Messages panel ── */
  #mo-msg-body { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  #mo-msg-compose {
    padding: 8px 10px; display: flex; gap: 6px;
    border-top: 1px solid var(--border); background: var(--surface2); flex-shrink: 0;
  }
  #mo-msg-input {
    flex: 1; padding: 10px 12px; font-size: 15px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; font-family: var(--font);
  }
  .mo-msg-out { background: rgba(88,166,255,.12); border: 1px solid rgba(88,166,255,.3); border-radius: 8px 8px 0 8px; padding: 6px 10px; align-self: flex-end; max-width: 88%; }
  .mo-msg-in  { background: rgba(63,185,80,.10);  border: 1px solid rgba(63,185,80,.3);  border-radius: 8px 8px 8px 0; padding: 6px 10px; align-self: flex-start; max-width: 88%; }
  .mo-msg-from { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .mo-msg-text { font-size: 14px; color: var(--text); }
  .mo-msg-ts   { font-size: 11px; color: var(--text3); margin-top: 2px; text-align: right; }

  /* ── Station picker modal ── */
  .sp-item {
    padding: 14px 16px; border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 8px; cursor: pointer; background: var(--surface2);
    transition: border-color 0.15s;
  }
  .sp-item:hover, .sp-item:active { border-color: var(--accent); background: var(--surface3, #161b22); }
  .sp-item-name { font-size: 17px; font-weight: bold; color: var(--text); }
  .sp-item-type { font-size: 12px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
  #station-picker .modal { max-height: 80vh; overflow-y: auto; max-width: 420px; }
</style>
</head>
<body>
<div id="mo-topbar">
  <div id="mot-row-name">
    <h1>&#9654; MobilOp</h1>
    <div class="pill pill-idle" id="mo-race-pill">LOADING...</div>
    <div id="mo-station-badge" title="Tap to change station" onclick="showStationPicker()">&#x25B6; tap to select station</div>
  </div>
  <div id="mot-row-clock">
    <div id="mo-clock">--:--:--</div>
  </div>
  <div id="mot-row-controls">
    <select id="mo-theme-sel" title="Display theme"></select>
    <select id="mo-base-layer-sel" title="Base map" onchange="setBaseLayer(this.value)">
      <option value="Topo">Topo</option>
      <option value="Satellite">Satellite</option>
      <option value="Street" selected>Street</option>
      <option value="Dark">Dark</option>
    </select>
    <button onclick="RT.logout()" style="flex-shrink:0">OUT</button>
  </div>
</div>

<!-- Main area: map + leaderboard sidebar (desktop), or map/leaderboard panels (mobile) -->
<div id="mo-main">
  <div id="mo-map-wrap">
    <div id="mo-map"></div>
  </div>
  <div id="mo-lb-wrap">
    <div id="mo-sort-bar">
      <span style="font-size:13px;color:var(--text3);align-self:center">SORT:</span>
      <button class="v-sort-btn active" data-sort="position" onclick="setSort('position')">POSITION</button>
      <button class="v-sort-btn" data-sort="bib" onclick="setSort('bib')">BIB</button>
      <button class="v-sort-btn" data-sort="pace" onclick="setSort('pace')">PACE</button>
      <button class="v-sort-btn" data-sort="name" onclick="setSort('name')">NAME</button>
      <button class="v-sort-btn" data-sort="heat" onclick="setSort('heat')">HEAT</button>
    </div>
    <div class="v-lb-head v-lb-cols">
      <span>#</span><span>BIB</span><span>NAME</span><span>PROG</span><span>PACE</span><span>LAST AID</span>
    </div>
    <div id="mo-lb-body"></div>
    <!-- Messaging section — shown at bottom of sidebar when messaging_enabled -->
    <div id="mo-msg-sidebar">
      <div style="padding:3px 8px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span style="font-size:11px;letter-spacing:2px;color:var(--text3)">MESSAGES</span>
        <span id="mo-msg-unread" style="font-size:12px;color:var(--accent2);font-weight:bold"></span>
      </div>
      <div class="msg-wrap" id="mo-msg-thread"></div>
      <div style="padding:5px 8px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:4px">
        <select id="mo-msg-to" style="width:100%;font-size:13px;padding:2px 4px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-family:var(--font)"></select>
        <div style="display:flex;gap:5px;align-items:center">
          <input id="mo-msg-input" placeholder="Message…" maxlength="67" style="flex:1;font-size:13px"
            onkeydown="if(event.key==='Enter'){event.preventDefault();sendMessage();}"
            oninput="updateMsgCharCount()">
          <span id="mo-msg-char-count" style="font-size:11px;color:var(--text3);min-width:26px;text-align:right"></span>
          <button class="primary" onclick="sendMessage()" style="font-size:13px;padding:3px 10px">SEND</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LOG panel — full-screen extra panel, mobile only -->
<div class="mo-extra-panel" id="mo-log-panel">
  <div id="mo-log-inner">
    <div id="mo-no-station" class="hidden">No station assigned — tap the station badge above to select one.</div>
    <div id="mo-search-bar">
      <input id="mo-bib-input" type="text" inputmode="numeric" placeholder="BIB #" autocomplete="off">
      <button id="mo-search-btn" class="primary" onclick="searchBib()">GO</button>
    </div>
    <div id="mo-participant-card">
      <div>
        <div class="mo-p-name" id="mo-p-name">—</div>
        <div class="mo-p-meta" id="mo-p-meta"></div>
      </div>
      <div class="mo-action-btns">
        <button class="mo-action-btn mo-btn-arrive" onclick="logEvent('aid_arrive')">ARRIVE</button>
        <button class="mo-action-btn mo-btn-depart" onclick="logEvent('aid_depart')">DEPART</button>
        <button class="mo-action-btn mo-btn-dnf"    onclick="logEvent('dnf')">DNF</button>
      </div>
    </div>
    <div id="mo-events-section">
      <div class="mo-events-head">RECENT STATION EVENTS</div>
      <div id="mo-events-list"></div>
    </div>
  </div>
</div>

<!-- MSG panel — full-screen extra panel, mobile only -->
<div class="mo-extra-panel" id="mo-msg-panel">
  <div id="mo-msg-body"></div>
  <div id="mo-msg-compose">
    <div style="padding:5px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px">
      <select id="mo-msg-to-mobile" style="width:100%;font-size:14px;padding:4px 6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-family:var(--font)"></select>
      <div style="display:flex;gap:6px;align-items:center">
        <input id="mo-msg-panel-input" placeholder="Message…" maxlength="67" style="flex:1;font-size:15px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:var(--font)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();sendMessageMobile();}"
          oninput="updateMsgCharCountMobile()">
        <span id="mo-msg-char-count-mobile" style="font-size:11px;color:var(--text3);min-width:26px;text-align:right"></span>
        <button class="primary" onclick="sendMessageMobile()" style="padding:10px 16px;font-size:15px">SEND</button>
      </div>
    </div>
  </div>
</div>

<div id="mo-tabbar">
  <button class="rt-tab active" data-tab="map" onclick="switchTab('map')">
    <span class="rt-tab-icon">&#x1F5FA;</span>
  </button>
  <button class="rt-tab" data-tab="lb" onclick="switchTab('lb')">
    <span class="rt-tab-icon">&#x1F3C5;</span>
  </button>
  <button class="rt-tab" data-tab="log" onclick="switchTab('log')">
    <span class="rt-tab-icon">&#x1F4CB;</span>
  </button>
  <button class="rt-tab hidden" id="tab-msg" data-tab="msg" onclick="switchTab('msg')">
    <span class="rt-tab-icon">&#x1F4AC;</span>
  </button>
</div>

<!-- Station picker -->
<div class="modal-bg hidden" id="station-picker">
  <div class="modal" style="max-width:420px;width:calc(100% - 32px)">
    <h2>SELECT YOUR STATION</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Choose the aid station you are operating.</p>
    <div id="sp-list"></div>
    <div class="modal-footer" id="sp-footer" style="display:none">
      <button onclick="document.getElementById('station-picker').classList.add('hidden')">CANCEL</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="js/common.js"></script>
<script src="js/mobileop.js"></script>
</body>
</html>
