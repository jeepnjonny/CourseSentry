<!--
  CourseSentry Race Selection Screen
  
  This page serves as the intermediate launch screen where users select which active race to join.
  It supports role-based redirects: operators go to operator.html, station personnel go to mobileop.html.
  If only one race is active, the page auto-redirects without showing selection UI.
  
  Layout:
  - Centered full-screen card layout with heading and description
  - Card grid: Individual race cards (name + date) for multi-race selection
  - Footer: Admin button (admin-only) and logout button
  
  Key Features:
  - Loads list of active races from /api/races
  - Auto-redirect for single active race (no UI needed)
  - Role-based destination routing (operator vs station/mobileop)
  - Responsive card layout (wraps on small screens)
  - Admin access gating (admin button only shows for admin role)
  
  Key Functions (inline JavaScript):
  - init(): Fetch active races and render selection cards or auto-redirect
  - Card click handlers: Navigate to operator/mobileop with race ID parameter
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CourseSentry — Select Race</title>
<base href="/CourseSentry/">
<link rel="icon" href="img/logo-icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/theme.css">
<link id="rt-theme-css" rel="stylesheet">
<style>
  .rs-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    gap: 24px;
  }
  .rs-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: var(--text); }
  .rs-subtitle { color: var(--text2); font-size: 14px; margin-top: -16px; }
  .rs-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    max-width: 800px;
    width: 100%;
  }
  .rs-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 36px;
    cursor: pointer;
    text-align: center;
    min-width: 200px;
    flex: 1;
    transition: border-color 0.15s, background 0.15s;
  }
  .rs-card:hover { border-color: var(--accent); background: var(--surface3); }
  .rs-card-name { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
  .rs-card-date { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .rs-none { color: var(--text2); font-size: 15px; }
  .rs-footer { display: flex; gap: 12px; }
</style>
</head>
<body>
<div class="rs-wrap">
  <div><img class="logo-reversed" src="img/logo-reversed.svg" alt="CourseSentry" height="40"><img class="logo-color" src="img/logo-color.svg" alt="CourseSentry" height="40"></div>
  <div class="rs-title">SELECT RACE</div>
  <div class="rs-subtitle" id="rs-subtitle">Loading active races…</div>
  <div class="rs-cards" id="rs-cards"></div>
  <div class="rs-footer">
    <button id="rs-admin-btn" class="hidden" onclick="window.location.href=RT.BASE+'admin.html'">ADMIN</button>
    <button onclick="RT.logout()">LOGOUT</button>
  </div>
</div>
<script src="js/common.js"></script>
<script>
RT.applyTheme();

async function init() {
  const user = await RT.requireLogin();
  if (!user) return;

  if (user.role === 'admin') {
    document.getElementById('rs-admin-btn').classList.remove('hidden');
  }

  const res = await RT.get('/api/races');
  if (!res.ok) {
    document.getElementById('rs-subtitle').textContent = 'Failed to load races.';
    return;
  }

  const active = res.data.filter(r => r.status === 'active');

  const dest = user.role === 'station' ? 'mobileop.html' : 'operator.html';
  if (active.length === 1) {
    window.location.replace(RT.BASE + dest + '?race=' + active[0].id);
    return;
  }

  const subtitle = document.getElementById('rs-subtitle');
  const cards = document.getElementById('rs-cards');

  if (active.length === 0) {
    subtitle.textContent = 'No races are currently active.';
    return;
  }

  subtitle.textContent = user.role === 'station' ? 'Choose a race to continue.' : 'Choose a race to open the operator view.';
  for (const race of active) {
    const card = document.createElement('div');
    card.className = 'rs-card';
    card.innerHTML = `<div class="rs-card-name">${race.name}</div><div class="rs-card-date">${race.date}</div>`;
    card.onclick = () => { window.location.href = RT.BASE + dest + '?race=' + race.id; };
    cards.appendChild(card);
  }
}

init();
</script>
</body>
</html>
